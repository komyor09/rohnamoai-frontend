<div class="layout-topbar">
    <div class="layout-topbar-logo-container">
        <button (click)="layoutService.onMenuToggle()" class="layout-menu-button layout-topbar-action">
            <i class="pi pi-bars"></i>
        </button>
        <a class="layout-topbar-logo" routerLink="/pages/home">
            <img alt="logo" class="mb-2" height="54" src="/svgs/logo.svg" width="40" />
            <span>RohnamoAI</span>
        </a>
    </div>

    <div class="layout-topbar-actions">
        <div class="layout-config-menu">
            <p-button (click)="toggleDarkMode()" class="layout-topbar-action" rounded text>
                <i [ngClass]="{ 'pi ': true, 'pi-moon': layoutService.isDarkTheme(), 'pi-sun': !layoutService.isDarkTheme() }"></i>
            </p-button>
            <!--      <div class="relative">-->
            <!--                <button-->
            <!--                    [hideOnOutsideClick]="true"-->
            <!--                    class="layout-topbar-action layout-topbar-action-highlight"-->
            <!--                    enterActiveClass="animate-scalein"-->
            <!--                    enterFromClass="hidden"-->
            <!--                    leaveActiveClass="animate-fadeout"-->
            <!--                    leaveToClass="hidden"-->
            <!--                    pStyleClass="@next">-->
            <!--                    <i class="pi pi-palette"></i>-->
            <!--                </button>-->
            <!--                <app-configurator />-->
            <!--            </div>-->
        </div>

        <button
            [hideOnOutsideClick]="true"
            class="layout-topbar-menu-button layout-topbar-action"
            enterActiveClass="animate-scalein"
            enterFromClass="hidden"
            leaveActiveClass="animate-fadeout"
            leaveToClass="hidden"
            pStyleClass="@next">
            <i class="pi pi-ellipsis-v"></i>
        </button>

        <div class="layout-topbar-menu hidden lg:block">
            <div class="layout-topbar-menu-content">

                @if (user()) {
                    <div class="hidden xl:flex items-center">
                        <!-- User info -->
                        <div class="flex flex-col leading-tight">
                            <!-- Name / Email -->
                            <div class="text-sm font-medium text-surface-900 dark:text-surface-0 mb-0.5">
                                {{ user()?.name || user()?.email }}
                            </div>
                            <!-- Plan -->
                            <p-tag
                                [severity]="user()?.plan === 'pro' ? 'success' : 'contrast'"
                                [value]="user()?.plan === 'pro' ? 'PRO' : 'FREE'"
                                class="w-fit !text-xs"
                            />
                        </div>
                    </div>
                    <!-- Profile -->
                    <p-button
                        class="layout-topbar-action"
                        rounded
                        routerLink="/pages/profile"
                        routerLinkActive="layout-topbar-action-active"
                    >
                        {{ (user()?.name || user()?.email)?.[0]?.toUpperCase() }}
                    </p-button>
                }

                <!-- Logout -->
                <button
                    (click)="logout()"
                    class="layout-topbar-action"
                    title="Выйти"
                    type="button">
                    <i class="pi pi-sign-out"></i>
                    <span>Выйти</span>
                </button>

            </div>
        </div>
    </div>
</div>
