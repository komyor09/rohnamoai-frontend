<div class="min-h-screen flex items-center justify-center bg-surface-50 dark:bg-surface-900">
    <div class="w-full max-w-md px-4">

        <!-- LOGO -->
        <div class="text-center mb-8">
            <img alt="RohnamoAI" class="mx-auto mb-4 h-24" src="/svgs/logo.svg" />
            <h1 class="text-2xl font-bold text-surface-900 dark:text-surface-0">
                Rohnamo AI
            </h1>
            <p class="text-muted-color mt-1">
                Создайте аккаунт
            </p>
        </div>

        <p-card class="dark:!bg-surface-500/20">

            @if (errorMsg()) {
                <div class="mb-4 p-3 rounded bg-red-50 dark:bg-red-900/20 text-red-600 text-sm">
                    <i class="pi pi-exclamation-circle mr-2"></i>
                    {{ errorMsg() }}
                </div>
            }

            <div class="flex flex-col gap-4">

                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-surface-700 dark:text-surface-300">
                        Имя <span class="text-muted-color font-normal">(необязательно)</span>
                    </label>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-user"></i>
                        </p-inputgroup-addon>
                        <input
                            [(ngModel)]="name"
                            class="w-full"
                            id="name"
                            pInputText
                            placeholder="Как вас зовут?"
                        />
                    </p-inputgroup>
                </div>

                <!-- EMAIL -->
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-surface-700 dark:text-surface-300">
                        Почта
                    </label>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-envelope"></i>
                        </p-inputgroup-addon>

                        <input
                            [(ngModel)]="email"
                            class="w-full"
                            pInputText
                            type="email"
                        />
                    </p-inputgroup>
                </div>

                <!-- PASSWORD -->
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-surface-700 dark:text-surface-300">
                        Пароль
                    </label>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-lock"></i>
                        </p-inputgroup-addon>

                        <p-password
                            [(ngModel)]="password"
                            [feedback]="true"
                            [toggleMask]="true"
                            inputStyleClass="w-full"
                            styleClass="w-full"
                        />
                    </p-inputgroup>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-surface-700 dark:text-surface-300">
                        Подтвердите пароль
                    </label>

                    <p-inputgroup>
                        <p-inputgroup-addon>
                            <i class="pi pi-lock"></i>
                        </p-inputgroup-addon>

                        <p-password
                            (keyup.enter)="submit()"
                            [(ngModel)]="passwordConfirm"
                            [feedback]="false"
                            [toggleMask]="true"
                            inputStyleClass="w-full"
                            styleClass="w-full"
                        />
                    </p-inputgroup>
                </div>

                <!-- BUTTON -->
                <div class="text-center m-1">
                    <p-button
                        (click)="submit()"
                        [disabled]="loading()"
                        class="w-full mt-2"
                    >
                        <i class="pi pi-user-plus mr-2"></i>
                        {{ loading() ? 'Регистрация...' : 'Зарегистрироваться' }}
                    </p-button>
                </div>
            </div>

            <!-- FOOTER -->
            <div class="text-center mt-4 text-sm text-muted-color">
                Уже есть аккаунт?
                <a
                    class="text-primary font-medium ml-1 cursor-pointer"
                    routerLink="/auth/login"
                >
                    Войти
                </a>
            </div>

        </p-card>

    </div>
</div>
