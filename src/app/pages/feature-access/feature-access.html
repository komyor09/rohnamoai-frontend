<div class="card border border-surface-200 dark:border-surface-700">

    <div class="flex items-start gap-3">
        <i class="pi pi-lock text-primary text-xl"></i>

        <div>
            <h3 class="mb-1">{{ featureTitle }}</h3>
            <p class="text-sm text-muted-color mb-3">
                {{ description }}
            </p>
        </div>
    </div>

    <div class="flex justify-between items-center mt-4">
        <div class="text-sm">
            <span class="font-medium">
                {{ requiredTokens }} токенов
            </span>
            <span class="text-muted-color">
                · у вас {{ userTokens }}
            </span>
        </div>

        <div class="flex gap-2">
            @if (hasEnoughTokens) {
                <button
                    class="p-button p-button-sm p-button-primary"
                    (click)="confirm.emit()">
                    Использовать токены
                </button>
            } @else {
                <button
                    class="p-button p-button-sm p-button-outlined"
                    (click)="upgrade.emit()">
                    Улучшить тариф
                </button>
            }
        </div>
    </div>

</div>
