<div class="grid grid-cols-12 gap-8">

    <!-- Header -->
    <div class="col-span-12">
        <h1 class="text-2xl font-semibold">
            Редактирование сценария
        </h1>
        <p class="text-muted-color">
            Вы можете изменить параметры сценария и сразу увидеть последствия
        </p>
    </div>

    <!-- Main Form -->
    <div class="col-span-12 lg:col-span-8">
        <div class="card">

            <!-- Title -->
            <div class="mb-4">
                <label class="text-sm text-muted-color">Название сценария</label>
                <input
                    [(ngModel)]="scenario.title"
                    class="w-full"
                    pInputText
                    type="text"
                />
            </div>

            <!-- Goal -->
            <div class="mb-4">
                <label class="text-sm text-muted-color">Цель поступления</label>
                <p-select
                    [(ngModel)]="scenario.goal"
                    [options]="goals"
                    class="w-full"
                />
            </div>

            <!-- Region -->
            <div class="mb-4">
                <label class="text-sm text-muted-color">Регион</label>
                <p-select
                    [(ngModel)]="scenario.region"
                    [options]="regions"
                    class="w-full"
                />
            </div>

            <!-- Fields -->
            <div class="mb-4">
                <label class="text-sm text-muted-color">Направления</label>
                <div class="flex flex-col gap-2 mt-2">
                    @for (field of fieldsList; track field) {
                        <p-checkbox
                            (onChange)="
                                $event.checked
                                    ? scenario.fields.push(field)
                                    : scenario.fields.splice(scenario.fields.indexOf(field), 1)
                            "
                            [binary]="true"
                            [label]="field"
                            [ngModel]="scenario.fields.includes(field)"
                        />
                    }
                </div>
            </div>

            <!-- Constraints -->
            <div class="mb-4">
                <label class="text-sm text-muted-color">Ограничения</label>

                <div class="mt-2">
                    <p-checkbox
                        [(ngModel)]="scenario.constraints.budgetOnly"
                        binary="true"
                        [textContent]="Только бюджетное обучение"
                    />
                </div>

                <div class="mt-3">
                    <p-select
                        [(ngModel)]="scenario.constraints.language"
                        [options]="languages"
                        class="w-full"
                        placeholder="Язык обучения"
                    />
                </div>
            </div>

        </div>
    </div>

    <!-- Actions -->
    <div class="col-span-12 lg:col-span-4">
        <div class="card bg-surface-50 dark:bg-surface-900/40">

            <h3 class="mb-2">Действия</h3>

            <p class="text-sm text-muted-color mb-4">
                Изменения могут повлиять на список подходящих специальностей
                и уровень совпадения.
            </p>

            <div class="flex flex-col gap-2">
                <button
                    (click)="save()"
                    class="p-button p-button-primary">
                    Сохранить изменения
                </button>

                @if (scenario.status !== 'completed') {
                    <button
                        (click)="complete()"
                        class="p-button p-button-outlined">
                        Завершить сценарий
                    </button>
                }
            </div>

        </div>
    </div>

</div>
