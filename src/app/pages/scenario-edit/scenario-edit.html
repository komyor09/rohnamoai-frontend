<div class="grid grid-cols-12 gap-8">

    <!-- Header -->
    <div class="col-span-12">
        <div class="flex items-center gap-3">
            <div
                class="flex items-center justify-center w-11 h-11 rounded-full
                       bg-primary-100 dark:bg-primary-900/30">
                <i class="pi pi-pencil text-primary text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-semibold">Редактирование сценария</h1>
                <p class="text-muted-color">
                    Изменяйте параметры и сразу понимайте последствия выбора
                </p>
            </div>
        </div>
    </div>

    <!-- Main Form -->
    <div class="col-span-12 lg:col-span-8">
        <div class="card space-y-6">

            <!-- Section: Title -->
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <i class="pi pi-tag text-primary"></i>
                    <label class="text-sm font-medium">Название сценария</label>
                </div>
                <input
                    [(ngModel)]="scenario.title"
                    pInputText
                    type="text"
                    class="w-full"
                    placeholder="Например: Бюджетное IT-обучение"
                />
            </div>

            <!-- Section: Goal -->
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <i class="pi pi-flag text-primary"></i>
                    <label class="text-sm font-medium">Цель поступления</label>
                </div>
                <p-select
                    [(ngModel)]="scenario.goal"
                    [options]="goals"
                    class="w-full"
                />
            </div>

            <!-- Section: Region -->
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <i class="pi pi-map-marker text-primary"></i>
                    <label class="text-sm font-medium">Регион</label>
                </div>
                <p-select
                    [(ngModel)]="scenario.region"
                    [options]="regions"
                    class="w-full"
                />
            </div>

            <!-- Section: Fields -->
            <div>
                <div class="flex items-center gap-2 mb-3">
                    <i class="pi pi-briefcase text-primary"></i>
                    <label class="text-sm font-medium">Направления</label>
                </div>

                <div class="grid grid-cols-12 gap-3">
                    @for (field of fieldsList; track field) {
                        <div
                            class="col-span-12 md:col-span-6
                                   flex items-center p-3 rounded
                                   border border-surface-200 dark:border-surface-700
                                   transition-all hover:border-primary
                                   hover:bg-surface-50 dark:hover:bg-surface-900/40">
                            <p-checkbox
                                [(ngModel)]="scenario.fields"
                                [inputId]="'field_' + field"
                                [value]="field"
                                name="fields"
                            />
                            <label
                                [for]="'field_' + field"
                                class="ml-3 text-sm cursor-pointer">
                                {{ field }}
                            </label>
                        </div>
                    }
                </div>
            </div>

            <!-- Section: Constraints -->
            <div>
                <div class="flex items-center gap-2 mb-3">
                    <i class="pi pi-sliders-h text-primary"></i>
                    <label class="text-sm font-medium">Ограничения</label>
                </div>

                <div
                    class="flex items-center p-3 rounded
                           border border-surface-200 dark:border-surface-700
                           mb-3">
                    <p-checkbox
                        [(ngModel)]="scenario.constraints.budgetOnly"
                        binary="true"
                        inputId="budgetOnly"
                    />
                    <label for="budgetOnly" class="ml-3 text-sm">
                        Только бюджетное обучение
                    </label>
                </div>

                <p-select
                    [(ngModel)]="scenario.constraints.language"
                    [options]="languages"
                    class="w-full"
                    placeholder="Язык обучения"
                />
            </div>

        </div>
    </div>

    <!-- Actions -->
    <div class="col-span-12 lg:col-span-4">
        <div
            class="card bg-gradient-to-b
                   from-surface-50 to-transparent
                   dark:from-surface-900/40">

            <div class="flex items-center gap-2 mb-3">
                <i class="pi pi-bolt text-primary"></i>
                <h3 class="mb-0">Действия</h3>
            </div>

            <p class="text-sm text-muted-color mb-4 leading-relaxed">
                Любые изменения могут повлиять на список подходящих
                специальностей и уровень совпадения.
            </p>

            <div class="flex flex-col gap-2">
                <p-button
                    (click)="save()"
                    icon="pi pi-save"
                    label="Сохранить изменения"
                />

                @if (scenario.status !== 'completed') {
                    <p-button
                        (click)="complete()"
                        icon="pi pi-check"
                        outlined
                        label="Завершить сценарий"
                    />
                }
            </div>

        </div>
    </div>

</div>
